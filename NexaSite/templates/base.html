{% load static %}
<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nexa{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/header.css' %}">
    <link rel="stylesheet" href="{% static 'css/footer.css' %}">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/cart-popup.css' %}">
    <link rel="stylesheet" href="{% static 'css/not-enough-stock-popup.css' %}">
    
    {% block extra_css %}{% endblock %}
    
    <script src="{% static 'js/theme.js' %}" defer></script>
</head>

<body>
    {% include "components/header.html" %}
    
    <main class="main">
        {% block content %}{% endblock %}
    </main>
    
    {% include "components/footer.html" %}

    <div id="cart-popup" class="cart-popup">
        <div class="cart-popup-content">
            <span class="cart-popup-text">Товар добавлен в корзину</span>
            <a href="/cart/" class="cart-popup-link">Перейти</a>
        </div>
    </div>

    <div id="not-enough-stock-popup" class="not-enough-stock-popup">
        <div class="not-enough-stock-popup-content">
            <span class="not-enough-stock-popup-text">Недостаточно товара</span>
        </div>
    </div>

    <script src="{% static 'js/cart.js' %}" defer></script>
</body>

</html>
