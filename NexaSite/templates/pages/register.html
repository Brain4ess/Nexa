{% extends "base.html" %}
{% load static %}

{% block title %}Регистрация — Nexa{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}
<div class="auth-page">
    <form method="post" class="auth-container">
        {% csrf_token %}

        <h2>Регистрация</h2>

        <input
        type="text"
        name="username"
        placeholder="Имя пользователя"
        value="{{ username|default:'' }}"
        minlength="3"
        maxlength="30"
        autocomplete="username"
        required
        >
        
        <input
        type="email"
        name="email"
        placeholder="Email"
        value="{{ email|default:'' }}"
        maxlength="128"
        autocomplete="email"
        required
        >
        
        <input
        type="password"
        name="password"
        placeholder="Пароль"
        minlength="8"
        maxlength="128"
        autocomplete="new-password"
        required
        >
        
        <input
        type="password"
        name="password2"
        placeholder="Повторите пароль"
        minlength="8"
        maxlength="128"
        autocomplete="new-password"
        required
        >
        
        {% if error %}
            <div class="form-error">{{ error }}</div>
        {% endif %}

        <button type="submit" class="cta">Создать аккаунт</button>
        
        <div class="auth-footer">
            Уже есть аккаунт?
            <a href="{% url 'login' %}">Войти</a>
        </div>
    </form>
</div>
{% endblock %}
