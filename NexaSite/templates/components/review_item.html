<article class="review-card" data-review-id="{{ review.id }}">
    <div class="review-card__top">
        <div class="review-card__author-block">
            <div class="review-card__author">{{ review.user.username }}</div>
            <div class="review-card__meta">
                <span>{{ review.get_usage_period_display }}</span>
                <span>•</span>
                <span>{{ review.created_at|date:"d.m.Y" }}</span>
            </div>
        </div>

        <div class="review-card__rating" aria-label="Оценка {{ review.rating }} из 5">
            {% for i in "12345" %}
                <span class="review-card__star {% if forloop.counter <= review.rating %}is-active{% endif %}">★</span>
            {% endfor %}
        </div>
    </div>

    <h3 class="review-card__title">{{ review.title }}</h3>
    <p class="review-card__text">{{ review.text|linebreaksbr }}</p>
</article>
